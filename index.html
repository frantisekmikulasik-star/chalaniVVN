<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:linear-gradient(135deg,#1d3a5f 0%,#1d6fc4 100%);min-height:100vh;
  display:flex;align-items:center;justify-content:center;font-family:'Segoe UI',system-ui,sans-serif}
.box{background:#fff;border-radius:14px;padding:40px 36px;width:100%;max-width:360px;
  box-shadow:0 20px 60px rgba(0,0,0,.35);text-align:center}
.logo{font-size:36px;margin-bottom:12px}
h1{font-size:18px;font-weight:800;color:#1a2535;margin-bottom:4px}
p{font-size:12px;color:#6b7fa0;margin-bottom:28px}
input{width:100%;padding:11px 14px;border:1px solid #d1dae6;border-radius:8px;
  font-size:15px;font-family:inherit;letter-spacing:2px;text-align:center;
  transition:border-color .15s;outline:none}
input:focus{border-color:#1d6fc4;box-shadow:0 0 0 3px rgba(29,111,196,.12)}
button{width:100%;margin-top:14px;padding:12px;background:#1d6fc4;color:#fff;
  border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;
  font-family:inherit;transition:background .15s}
button:hover{background:#155a9e}
.err{color:#c0392b;font-size:12px;margin-top:10px;min-height:18px}
</style>
</head>

<div class="box">
  <div class="logo">⚡</div>
  <h1>Partia výroby VVN</h1>

</div>

var ADMIN_HASH="52449fdb12de08ff8674447dcc9d9abec693d7c0348d498771e52476e555ac1a";
async function sha256hex(s){
  var buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(s));
  return Array.from(new Uint8Array(buf)).map(function(b){return b.toString(16).padStart(2,'0');}).join('');
}
async function unlock(){
  var pw=document.getElementById('pw').value.toLowerCase().trim();
  if(!pw)return;
  document.querySelector('button').textContent='...';
  try{
    var h=await sha256hex(pw);
    var isAdmin=(h===ADMIN_HASH);

    var d=Uint8Array.from(atob(PAYLOAD),c=>c.charCodeAt(0));
    var salt=d.slice(0,32),iv=d.slice(32,48),ct=d.slice(48);
    var km=await crypto.subtle.importKey('raw',new TextEncoder().encode(decPw),'PBKDF2',false,['deriveKey']);
    var key=await crypto.subtle.deriveKey({name:'PBKDF2',salt,iterations:600000,hash:'SHA-256'},km,{name:'AES-CBC',length:256},false,['decrypt']);
    var dec=await crypto.subtle.decrypt({name:'AES-CBC',iv},key,ct);
    var html=new TextDecoder().decode(dec);
    if(isAdmin) html=html.replace('.admin-only{display:none}','.admin-only{}');
