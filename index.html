<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Partia výroby VVN</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='16' fill='%235bb8f5'/%3E%3Cpolygon points='18,4 10,18 16,18 14,28 22,14 16,14' fill='white'/%3E%3C/svg%3E">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:linear-gradient(135deg,#1d3a5f 0%,#1d6fc4 100%);min-height:100vh;
  display:flex;align-items:center;justify-content:center;font-family:'Segoe UI',system-ui,sans-serif;
  padding:0 20px}
.box{background:#fff;border-radius:14px;padding:40px 36px;width:100%;max-width:360px;
  box-shadow:0 20px 60px rgba(0,0,0,.35);text-align:center;position:relative;z-index:1;margin-bottom:15vh}
.logo{font-size:36px;margin-bottom:12px}
h1{font-size:18px;font-weight:800;color:#1a2535;margin-bottom:4px}
.sub{font-size:12px;color:#6b7fa0;margin-bottom:28px}
.field{text-align:left;margin-bottom:12px}
label{font-size:11px;font-weight:700;color:#6b7fa0;letter-spacing:.5px;text-transform:uppercase;display:block;margin-bottom:4px}
input{width:100%;padding:11px 14px;border:1px solid #d1dae6;border-radius:8px;
  font-size:15px;font-family:inherit;transition:border-color .15s;outline:none}
input:focus{border-color:#1d6fc4;box-shadow:0 0 0 3px rgba(29,111,196,.12)}
button{width:100%;margin-top:6px;padding:12px;background:#1d6fc4;color:#fff;
  border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;
  font-family:inherit;transition:background .15s}
button:hover{background:#155a9e}
.err{color:#c0392b;font-size:12px;margin-top:10px;min-height:18px}
/* ── Rotating planet ── */
.planet{position:fixed;bottom:-380px;left:50%;transform:translateX(-50%);
  width:min(820px,100vw);pointer-events:none;z-index:0;overflow:visible;}
@media(max-width:820px){.planet{bottom:-160px;}}
</style>
</head>
<body>
<div class="box">
  <div class="logo">⚡</div>
  <h1>Partia výroby VVN</h1>
  <p class="sub">Zadaj prihlasovacie údaje</p>
  <div class="field">
    <label>Meno</label>
    <input type="text" id="u" placeholder="Zadaj" autocomplete="username"
      onkeydown="if(event.key==='Enter')document.getElementById('p').focus()">
  </div>
  <div class="field">
    <label>Heslo</label>
    <input type="password" id="p" placeholder="••••••••" autocomplete="current-password"
      onkeydown="if(event.key==='Enter')login()">
  </div>
  <button onclick="login()" id="btn">Vstúpiť</button>
  <div class="err" id="err"></div>
</div>

const IT=600000;

function b64(s){return Uint8Array.from(atob(s),c=>c.charCodeAt(0));}
function str(s){return new TextEncoder().encode(s);}

window.addEventListener('message',function(e){
  if(e.data==='vvn_logout'){sessionStorage.removeItem('vvn_s');location.reload();}
});

async function decryptAndShow(masterKey,role,name){
  const contentB64=role==='admin'?CA:CU;
  const cb=b64(contentB64),iv2=cb.slice(0,16),ct=cb.slice(16);
  const ck=await crypto.subtle.importKey('raw',masterKey,'AES-CBC',false,['decrypt']);
  const html=new TextDecoder().decode(await crypto.subtle.decrypt({name:'AES-CBC',iv:iv2},ck,ct));
  const inject='<script>window.VVN_USER={n:"'+name+'",r:"'+role+'"};<\/script>';
  const finalHtml=html.replace('<head>','<head>'+inject);
  const fr=document.createElement('iframe');
  fr.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;border:none;z-index:9999';
  fr.srcdoc=finalHtml;
  fr.onload=function(){if(window._pRAF){cancelAnimationFrame(window._pRAF);window._pRAF=null;}};
  document.body.appendChild(fr);
}

async function login(){
  const username=document.getElementById('u').value.trim().toLowerCase();
  const password=document.getElementById('p').value;
  const btn=document.getElementById('btn');
  const err=document.getElementById('err');
  err.textContent='';
  if(!username||!password)return;
  btn.textContent='...';
  const user=USERS.find(u=>u.u===username);
  if(!user){err.textContent='Nesprávne meno alebo heslo';btn.textContent='Vstúpiť';return;}
  try{
    const salt=b64(user.s),iv1=b64(user.i),encKey=b64(user.k);
    const pwKey=await crypto.subtle.importKey('raw',str(password),'PBKDF2',false,['deriveKey']);
    const dk=await crypto.subtle.deriveKey({name:'PBKDF2',salt,iterations:IT,hash:'SHA-256'},pwKey,{name:'AES-CBC',length:256},false,['decrypt']);
    const masterKey=new Uint8Array(await crypto.subtle.decrypt({name:'AES-CBC',iv:iv1},dk,encKey));
    const mkB64=btoa(String.fromCharCode.apply(null,masterKey));
    try{sessionStorage.setItem('vvn_s',JSON.stringify({k:mkB64,r:user.r,n:user.n}));}catch(se){}
    await decryptAndShow(masterKey,user.r,user.n);
  }catch(e){
    err.textContent='Nesprávne meno alebo heslo';
    btn.textContent='Vstúpiť';
    document.getElementById('p').value='';
    document.getElementById('p').focus();
  }
}

// Auto-login pri reloade
(async function(){
  const raw=sessionStorage.getItem('vvn_s');
  if(!raw){document.getElementById('u').focus();return;}
  try{
    const s=JSON.parse(raw);
    const mk=b64(s.k);
    document.querySelector('.box').innerHTML='<div style="color:#1d6fc4;font-size:15px;font-weight:600;padding:20px">Prihlasujem…</div>';
    await decryptAndShow(mk,s.r,s.n);
  }catch(e){
    sessionStorage.removeItem('vvn_s');
    location.reload();
  }
})();
</script>
